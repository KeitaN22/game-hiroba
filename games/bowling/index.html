<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>そうすけの ボウリング</title>
<link rel="stylesheet" href="../../style.css">
<style>
  body { background: linear-gradient(135deg, #FFE985 0%, #FF9A9E 100%); background-attachment: fixed; }

  .stage-wrap {
    position: relative;
    width: 100%;
    max-width: 380px;
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    background: #EAD9B8;
    border-radius: 20px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15), 0 12px 24px rgba(0,0,0,0.2);
  }

  .hud {
    display: flex; gap: 16px; font-size: 1.1rem; font-weight: bold;
    background: rgba(255,255,255,0.85); border-radius: 16px; padding: 8px 18px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .action-btn {
    font-size: 1.5rem;
    font-weight: bold;
    padding: 16px 50px;
    border: none;
    border-radius: 999px;
    background: #FF5D8F;
    color: #fff;
    box-shadow: 0 6px 0 #c73f6a;
    cursor: pointer;
    user-select: none;
    touch-action: none;
    margin-top: 18px;
  }
  .action-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c73f6a; }

  .overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    color: #fff; text-align: center; z-index: 10; padding: 20px;
  }
  .overlay.hide { display: none; }
  .hide { display: none !important; }
  .overlay h2 { font-size: 2rem; margin: 6px 0; }
  .overlay p { font-size: 1.2rem; margin: 6px 0 18px; line-height: 1.6; }
</style>
</head>
<body class="game-body">
  <a class="home-link" href="../../index.html">🏠 ホームにもどる</a>
  <button class="mute-btn" id="muteBtn">🔊</button>
  <h1 class="game-title">🎳 そうすけの ボウリング</h1>

  <div class="hud">
    <span>なげる かい 🎯 <span id="rollNum">1</span> かいめ</span>
    <span>たおした ピン 🎳 <span id="pinsDown">0</span> / 10</span>
  </div>

  <div class="stage-wrap">
    <canvas id="stage" width="320" height="440"></canvas>

    <div class="overlay" id="startOverlay">
      <h2>🎳 ボウリング</h2>
      <p>
        まず「ねらいを きめる」で うごく やじるしを タップして とめよう。<br>
        つぎに「ちからを きめる」で うごく バーを タップして とめよう。<br>
        たまが とんで いって、ピンに あたると たおれるよ！<br>
        はしっこを ねらいすぎると ガター(それる)に なっちゃう。<br>
        1かいめで ぜんぶ たおせたら ストライク！
      </p>
      <button class="big-btn" id="startBtn">▶ スタート</button>
    </div>

    <div class="overlay hide" id="resultOverlay">
      <h2 id="resultTitle">🎉 けっか 🎉</h2>
      <p id="resultText">たおした ピン: 0 / 10</p>
      <button class="big-btn" id="retryBtn">🔄 もういちど</button>
    </div>
  </div>

  <button class="action-btn hide" id="actionBtn">🎯 ねらいを きめる</button>

  <script src="../../audio.js"></script>
  <script>
    const muteBtn = document.getElementById('muteBtn');
    muteBtn.addEventListener('click', () => {
      const isMuted = GameAudio.toggleMute();
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const rollNumEl = document.getElementById('rollNum');
    const pinsDownEl = document.getElementById('pinsDown');
    const startOverlay = document.getElementById('startOverlay');
    const resultOverlay = document.getElementById('resultOverlay');
    const resultTitle = document.getElementById('resultTitle');
    const resultText = document.getElementById('resultText');
    const actionBtn = document.getElementById('actionBtn');

    const W = canvas.width, H = canvas.height;
    const LANE_WIDTH = 220;
    const LANE_LEFT = (W - LANE_WIDTH) / 2;
    const LANE_RIGHT = LANE_LEFT + LANE_WIDTH;
    const GUTTER_MARGIN = 16;
    const BALL_START_Y = 400;
    const BALL_END_Y = 30;
    const BASE_HIT_RADIUS = 20;
    const EXTRA_HIT_RADIUS = 18;

    const PIN_ROWS = [
      { y: 150, dxs: [0] },
      { y: 118, dxs: [-19, 19] },
      { y: 86, dxs: [-38, 0, 38] },
      { y: 54, dxs: [-57, -19, 19, 57] },
    ];

    let pins = [];
    let roll = 1;
    let pinsDownTotal = 0;
    let phase = 'idle'; // idle, aim, power, throwing, done
    let aimX = W / 2;
    let aimDir = 1;
    let power = 0;
    let powerDir = 1;
    let lockedAimX = W / 2;
    let ball = null;
    let lastFrame = performance.now();

    function makePins() {
      pins = [];
      const cx = LANE_LEFT + LANE_WIDTH / 2;
      PIN_ROWS.forEach(row => {
        row.dxs.forEach(dx => {
          pins.push({ x: cx + dx, y: row.y, down: false });
        });
      });
    }

    function resetFrame() {
      makePins();
      roll = 1;
      pinsDownTotal = 0;
      rollNumEl.textContent = roll;
      pinsDownEl.textContent = pinsDownTotal;
      ball = null;
      startAimPhase();
    }

    function startAimPhase() {
      phase = 'aim';
      aimX = W / 2;
      aimDir = 1;
      actionBtn.textContent = '🎯 ねらいを きめる';
      actionBtn.classList.remove('hide');
    }

    function startPowerPhase() {
      lockedAimX = aimX;
      phase = 'power';
      power = 0;
      powerDir = 1;
      actionBtn.textContent = '💪 ちからを きめる';
    }

    function startThrow() {
      phase = 'throwing';
      actionBtn.classList.add('hide');
      const hitRadius = BASE_HIT_RADIUS + EXTRA_HIT_RADIUS * power;
      const speed = 3 + power * 5;
      const isGutter = lockedAimX < LANE_LEFT + GUTTER_MARGIN || lockedAimX > LANE_RIGHT - GUTTER_MARGIN;
      ball = {
        x: lockedAimX,
        y: BALL_START_Y,
        speed,
        hitRadius,
        gutter: isGutter,
      };
    }

    function onActionTap() {
      if (phase === 'aim') {
        startPowerPhase();
      } else if (phase === 'power') {
        startThrow();
      }
    }

    function finishRoll() {
      pinsDownTotal = pins.filter(p => p.down).length;
      pinsDownEl.textContent = pinsDownTotal;

      if (roll === 1) {
        if (pinsDownTotal === 10) {
          showResult('🎉 ストライク！ 🎉', 'すごい！ いっかいで ぜんぶ たおしたよ！');
          return;
        }
        roll = 2;
        rollNumEl.textContent = roll;
        phase = 'idle';
        setTimeout(startAimPhase, 800);
      } else {
        if (pinsDownTotal === 10) {
          showResult('🎉 スペア！ 🎉', '2かいで ぜんぶ たおしたよ！ よくやった！');
        } else {
          showResult('🎳 けっか', `たおした ピン: ${pinsDownTotal} / 10`);
        }
      }
    }

    function showResult(title, text) {
      phase = 'done';
      resultTitle.textContent = title;
      resultText.textContent = text;
      GameAudio.stopBGM();
      if (pinsDownTotal === 10) {
        GameAudio.playClearFanfare();
      } else {
        GameAudio.playClickTick();
      }
      resultOverlay.classList.remove('hide');
    }

    function update(dt) {
      if (phase === 'aim') {
        aimX += aimDir * 2.4 * (dt / 16.7);
        if (aimX < LANE_LEFT - 20) { aimX = LANE_LEFT - 20; aimDir = 1; }
        if (aimX > LANE_RIGHT + 20) { aimX = LANE_RIGHT + 20; aimDir = -1; }
      } else if (phase === 'power') {
        power += powerDir * 0.025 * (dt / 16.7);
        if (power > 1) { power = 1; powerDir = -1; }
        if (power < 0) { power = 0; powerDir = 1; }
      } else if (phase === 'throwing' && ball) {
        ball.y -= ball.speed * (dt / 16.7);

        if (!ball.gutter) {
          pins.forEach(p => {
            if (!p.down && ball.y <= p.y && Math.abs(ball.x - p.x) < ball.hitRadius) {
              p.down = true;
            }
          });
        }

        if (ball.y <= BALL_END_Y) {
          ball = null;
          finishRoll();
        }
      }
    }

    function drawLane() {
      ctx.fillStyle = '#C9A36A';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#EAD9B8';
      ctx.fillRect(LANE_LEFT, 0, LANE_WIDTH, H);
      ctx.strokeStyle = '#B88C55';
      ctx.lineWidth = 3;
      for (let i = 1; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(LANE_LEFT, i * (H / 6));
        ctx.lineTo(LANE_RIGHT, i * (H / 6));
        ctx.stroke();
      }
    }

    function drawPin(p) {
      if (p.down) return;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(0, 0, 9, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.strokeStyle = '#FF5D5D';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-8, -3);
      ctx.lineTo(8, -3);
      ctx.stroke();
      ctx.restore();
    }

    function drawAimMarker() {
      if (phase !== 'aim') return;
      ctx.fillStyle = '#FF5D8F';
      ctx.beginPath();
      ctx.moveTo(aimX - 10, BALL_START_Y + 25);
      ctx.lineTo(aimX + 10, BALL_START_Y + 25);
      ctx.lineTo(aimX, BALL_START_Y + 10);
      ctx.closePath();
      ctx.fill();
    }

    function drawPowerBar() {
      if (phase !== 'power' && phase !== 'throwing') return;
      if (phase === 'throwing' && !ball) return;
      const barW = 160, barH = 18;
      const barX = W / 2 - barW / 2, barY = H - 30;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#4CAF50';
      const fillW = phase === 'power' ? barW * power : barW * (ball ? ball.speed / 8 : 0);
      ctx.fillRect(barX, barY, fillW, barH);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(barX, barY, barW, barH);
    }

    function drawBall() {
      if (!ball) return;
      ctx.fillStyle = '#3B3B58';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6B6B9A';
      ctx.beginPath();
      ctx.arc(ball.x - 4, ball.y - 4, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      drawLane();
      pins.forEach(drawPin);
      drawAimMarker();
      drawPowerBar();
      drawBall();
    }

    function loop(now) {
      const dt = Math.min(50, now - lastFrame);
      lastFrame = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    actionBtn.addEventListener('click', onActionTap);

    document.getElementById('startBtn').addEventListener('click', () => {
      startOverlay.classList.add('hide');
      resetFrame();
      GameAudio.playBGM();
    });
    document.getElementById('retryBtn').addEventListener('click', () => {
      resultOverlay.classList.add('hide');
      resetFrame();
      GameAudio.playBGM();
    });

    makePins();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
