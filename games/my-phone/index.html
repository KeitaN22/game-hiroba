<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>そうすけの マイケータイ</title>
<link rel="stylesheet" href="../../style.css">
<style>
  body { background: linear-gradient(135deg, #2C3E50 0%, #4A6572 100%); background-attachment: fixed; }

  .stage-wrap {
    position: relative;
    width: 100%;
    max-width: 320px;
  }

  .phone-frame {
    width: 100%;
    aspect-ratio: 9 / 19;
    background: #1a1a1a;
    border-radius: 36px;
    padding: 12px 10px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.3), 0 16px 30px rgba(0,0,0,0.4);
    box-sizing: border-box;
  }

  .phone-screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #FFE985 0%, #FFC1E3 100%);
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 34%; height: 16px;
    background: #1a1a1a;
    border-radius: 0 0 12px 12px;
    z-index: 30;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px 2px;
    font-size: 0.68rem; font-weight: bold; color: #333;
    flex-shrink: 0;
  }

  .home-indicator {
    width: 34%; height: 4px; background: rgba(0,0,0,0.5);
    border-radius: 3px; margin: 6px auto 4px; flex-shrink: 0;
  }

  .screen-body {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .screen-view {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
  }
  .screen-view.hide { display: none; }

  /* home screen */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 10px;
    padding: 18px 14px;
  }
  .app-icon-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    font-family: inherit;
  }
  .app-icon-glyph {
    width: 100%; aspect-ratio: 1;
    border-radius: 22%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
  }
  .app-icon-btn:active .app-icon-glyph { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
  .app-icon-label {
    font-size: 0.62rem; font-weight: bold; color: #333;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
  }

  /* app header */
  .app-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.55);
    flex-shrink: 0;
  }
  .app-back-btn {
    font-size: 1.1rem; border: none; background: none; cursor: pointer;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #333;
  }
  .app-back-btn:active { background: rgba(0,0,0,0.1); }
  .app-title { font-size: 0.85rem; font-weight: bold; color: #333; }

  /* chat app */
  .lock-body {
    flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
  }
  .lock-body .lock-icon { font-size: 2.4rem; }
  .password-btn {
    font-size: 0.85rem; font-weight: bold;
    padding: 12px 26px;
    border: none; border-radius: 999px;
    background: #333; color: #fff;
    box-shadow: 0 4px 0 #000;
    cursor: pointer;
  }
  .password-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; }

  .chat-log {
    flex: 1; overflow-y: auto;
    padding: 10px 10px 4px;
    display: flex; flex-direction: column; gap: 6px;
    background: #F5F5F0;
  }
  .chat-bubble {
    max-width: 75%;
    padding: 7px 12px;
    border-radius: 16px;
    font-size: 0.78rem;
    line-height: 1.4;
    align-self: flex-end;
    background: #A0E75A;
    color: #222;
    word-break: break-word;
  }
  .chat-input-row {
    display: flex; gap: 6px; padding: 8px; background: #fff; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; min-width: 0;
    padding: 8px 12px;
    border-radius: 999px; border: 1px solid #ccc;
    font-size: 0.8rem;
  }
  .chat-send-btn {
    font-size: 0.78rem; font-weight: bold;
    padding: 8px 14px;
    border: none; border-radius: 999px;
    background: #4CD964; color: #fff;
    cursor: pointer;
  }
  .stamp-row {
    display: flex; gap: 6px; padding: 4px 8px; background: #fff; flex-shrink: 0; overflow-x: auto;
  }
  .stamp-btn {
    font-size: 1.1rem;
    border: none; border-radius: 12px;
    background: #F0F0F0;
    padding: 4px 8px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* calculator app */
  .calc-display {
    flex-shrink: 0;
    padding: 18px 16px;
    text-align: right;
    font-size: 1.8rem;
    font-weight: bold;
    color: #222;
    background: rgba(255,255,255,0.4);
    word-break: break-all;
  }
  .calc-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 8px;
  }
  .calc-btn {
    border: none; border-radius: 12px;
    background: rgba(255,255,255,0.75);
    font-size: 1rem; font-weight: bold; color: #333;
    cursor: pointer;
  }
  .calc-btn:active { background: rgba(255,255,255,1); }
  .calc-btn.op { background: #FFB74D; color: #fff; }
  .calc-btn.eq { background: #4CAF50; color: #fff; }
  .calc-btn.clear { background: #FF6B6B; color: #fff; }

  /* music app */
  .music-body {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    padding: 10px;
  }
  .album-art {
    width: 55%; aspect-ratio: 1;
    border-radius: 50%;
    background: conic-gradient(#FF6FA5, #FFD93D, #4FC3F7, #A0D468, #FF6FA5);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .album-art.spinning { animation: spin 3s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .song-title { font-size: 0.9rem; font-weight: bold; color: #333; text-align: center; }
  .music-controls { display: flex; gap: 16px; align-items: center; }
  .music-btn {
    font-size: 1.3rem; border: none; background: rgba(255,255,255,0.6);
    width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
  }
  .music-btn.play { width: 54px; height: 54px; font-size: 1.6rem; background: #FF6FA5; color: #fff; }
  .music-btn:active { transform: scale(0.92); }
</style>
</head>
<body class="game-body">
  <a class="home-link" href="../../index.html">🏠 ホームにもどる</a>
  <button class="mute-btn" id="muteBtn">🔊</button>
  <h1 class="game-title">📱 そうすけの マイケータイ</h1>

  <div class="stage-wrap">
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="notch"></div>
        <div class="status-bar">
          <span id="clockNow">12:00</span>
          <span>📶 📡 🔋100%</span>
        </div>

        <div class="screen-body">
          <div class="screen-view" id="view-home">
            <div class="app-grid" id="appGrid"></div>
          </div>

          <div class="screen-view hide" id="view-chat">
            <div class="app-header">
              <button class="app-back-btn" data-home>⬅</button>
              <span class="app-title">💬 スタンプでOK</span>
            </div>
            <div class="lock-body" id="chatLockBody">
              <span class="lock-icon">🔒</span>
              <button class="password-btn" id="passwordBtn">パスワード</button>
            </div>
            <div class="screen-view hide" id="chatMainBody" style="position:static; flex:1;">
              <div class="chat-log" id="chatLog"></div>
              <div class="stamp-row">
                <button class="stamp-btn" data-stamp="👍OK">👍OK</button>
                <button class="stamp-btn" data-stamp="❤️いいね">❤️いいね</button>
                <button class="stamp-btn" data-stamp="🎉やった！">🎉やった！</button>
                <button class="stamp-btn" data-stamp="😄うんうん">😄うんうん</button>
              </div>
              <div class="chat-input-row">
                <input class="chat-input" id="chatInput" placeholder="メッセージを かく…" maxlength="40">
                <button class="chat-send-btn" id="chatSendBtn">そうしん</button>
              </div>
            </div>
          </div>

          <div class="screen-view hide" id="view-calc">
            <div class="app-header">
              <button class="app-back-btn" data-home>⬅</button>
              <span class="app-title">🔢 でんたく</span>
            </div>
            <div class="calc-display" id="calcDisplay">0</div>
            <div class="calc-grid" id="calcGrid"></div>
          </div>

          <div class="screen-view hide" id="view-music">
            <div class="app-header">
              <button class="app-back-btn" data-home>⬅</button>
              <span class="app-title">🎵 おんがく</span>
            </div>
            <div class="music-body">
              <div class="album-art" id="albumArt">🎵</div>
              <div class="song-title" id="songTitle">きらきらぼし</div>
              <div class="music-controls">
                <button class="music-btn" id="prevBtn">⏮️</button>
                <button class="music-btn play" id="playBtn">▶️</button>
                <button class="music-btn" id="nextBtn">⏭️</button>
              </div>
            </div>
          </div>
        </div>

        <div class="home-indicator"></div>
      </div>
    </div>
  </div>

  <script src="../../audio.js"></script>
  <script>
    const muteBtn = document.getElementById('muteBtn');
    muteBtn.addEventListener('click', () => {
      const isMuted = GameAudio.toggleMute();
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    const clockNowEl = document.getElementById('clockNow');
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      clockNowEl.textContent = `${h}:${m}`;
    }
    updateClock();
    setInterval(updateClock, 10000);

    const APPS = [
      { id: 'chat', label: 'スタンプでOK', icon: '💬', color: '#7DE07D' },
      { id: 'calc', label: 'でんたく', icon: '🔢', color: '#9FB4C7' },
      { id: 'music', label: 'おんがく', icon: '🎵', color: '#FFB0CB' },
    ];

    const appGridEl = document.getElementById('appGrid');
    APPS.forEach(app => {
      const btn = document.createElement('button');
      btn.className = 'app-icon-btn';
      btn.innerHTML = `<span class="app-icon-glyph" style="background:${app.color}">${app.icon}</span><span class="app-icon-label">${app.label}</span>`;
      btn.addEventListener('click', () => openApp(app.id));
      appGridEl.appendChild(btn);
    });

    const views = {
      home: document.getElementById('view-home'),
      chat: document.getElementById('view-chat'),
      calc: document.getElementById('view-calc'),
      music: document.getElementById('view-music'),
    };

    function showView(id) {
      Object.values(views).forEach(v => v.classList.add('hide'));
      views[id].classList.remove('hide');
    }

    function openApp(id) {
      GameAudio.playClickTick();
      showView(id);
    }

    document.querySelectorAll('[data-home]').forEach(btn => {
      btn.addEventListener('click', () => { GameAudio.playClickTick(); showView('home'); });
    });

    // --- chat app ---
    const chatLockBody = document.getElementById('chatLockBody');
    const chatMainBody = document.getElementById('chatMainBody');
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');

    document.getElementById('passwordBtn').addEventListener('click', () => {
      GameAudio.playClickTick();
      chatLockBody.classList.add('hide');
      chatMainBody.classList.remove('hide');
    });

    function sendChatMessage(text) {
      if (!text || !text.trim()) return;
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';
      bubble.textContent = text;
      chatLog.appendChild(bubble);
      chatLog.scrollTop = chatLog.scrollHeight;
      GameAudio.playClickTick();
    }

    document.getElementById('chatSendBtn').addEventListener('click', () => {
      sendChatMessage(chatInput.value);
      chatInput.value = '';
    });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        sendChatMessage(chatInput.value);
        chatInput.value = '';
      }
    });
    document.querySelectorAll('.stamp-btn').forEach(btn => {
      btn.addEventListener('click', () => sendChatMessage(btn.dataset.stamp));
    });

    // --- calculator app ---
    const calcDisplay = document.getElementById('calcDisplay');
    const calcGridEl = document.getElementById('calcGrid');
    let calcExpr = '';

    const CALC_KEYS = [
      '7', '8', '9', '÷',
      '4', '5', '6', '×',
      '1', '2', '3', '-',
      'C', '0', '=', '+',
    ];
    CALC_KEYS.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'calc-btn' + (['÷', '×', '-', '+'].includes(key) ? ' op' : key === '=' ? ' eq' : key === 'C' ? ' clear' : '');
      btn.textContent = key;
      btn.addEventListener('click', () => calcPress(key));
      calcGridEl.appendChild(btn);
    });

    function calcPress(key) {
      GameAudio.playClickTick();
      if (key === 'C') {
        calcExpr = '';
      } else if (key === '=') {
        try {
          const safeExpr = calcExpr.replace(/×/g, '*').replace(/÷/g, '/');
          if (!/^[0-9+\-*/.]+$/.test(safeExpr)) throw new Error('bad');
          // eslint-disable-next-line no-new-func
          const result = Function(`"use strict"; return (${safeExpr})`)();
          calcExpr = String(Math.round(result * 1000) / 1000);
        } catch (e) {
          calcExpr = 'エラー';
        }
      } else {
        if (calcExpr === 'エラー') calcExpr = '';
        calcExpr += key;
      }
      calcDisplay.textContent = calcExpr === '' ? '0' : calcExpr;
    }

    // --- music app ---
    const SONGS = ['きらきらぼし', 'ちょうちょう', 'どんぐりころころ', 'ぞうさん'];
    let songIndex = 0;
    let musicPlaying = false;
    const albumArt = document.getElementById('albumArt');
    const songTitleEl = document.getElementById('songTitle');
    const playBtn = document.getElementById('playBtn');

    function renderSong() {
      songTitleEl.textContent = SONGS[songIndex];
    }

    playBtn.addEventListener('click', () => {
      musicPlaying = !musicPlaying;
      GameAudio.playClickTick();
      if (musicPlaying) {
        GameAudio.playBGM();
        albumArt.classList.add('spinning');
        playBtn.textContent = '⏸️';
      } else {
        GameAudio.stopBGM();
        albumArt.classList.remove('spinning');
        playBtn.textContent = '▶️';
      }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      GameAudio.playClickTick();
      songIndex = (songIndex + 1) % SONGS.length;
      renderSong();
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      GameAudio.playClickTick();
      songIndex = (songIndex - 1 + SONGS.length) % SONGS.length;
      renderSong();
    });

    renderSong();
    showView('home');
  </script>
</body>
</html>
