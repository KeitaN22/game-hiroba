<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>そうすけの くるまピカピカ</title>
<link rel="stylesheet" href="../../style.css">
<style>
  body { background: linear-gradient(135deg, #A8E6CF 0%, #DCEDC1 100%); background-attachment: fixed; }

  .stage-wrap {
    position: relative;
    width: 100%;
    max-width: 460px;
  }

  canvas {
    width: 100%;
    height: auto;
    display: block;
    background: #EAF6FF;
    border-radius: 20px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15), 0 12px 24px rgba(0,0,0,0.2);
    touch-action: none;
    cursor: pointer;
  }

  .hud {
    display: flex; flex-wrap: wrap; gap: 16px; font-size: 1.1rem; font-weight: bold;
    background: rgba(255,255,255,0.85); border-radius: 16px; padding: 8px 18px;
    margin-bottom: 14px;
  }

  .overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.65);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    color: #fff; text-align: center; z-index: 10; padding: 20px;
    overflow-y: auto;
  }
  .overlay.hide { display: none !important; }
  .hide { display: none !important; }
  .overlay h2 { font-size: 2rem; margin: 6px 0; }
  .overlay p { font-size: 1.2rem; margin: 6px 0 18px; line-height: 1.6; }

  .stage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 10px;
    width: 100%;
    margin: 10px 0 20px;
  }
  .stage-card {
    border: none;
    border-radius: 16px;
    padding: 12px 6px;
    background: #fff;
    color: #333;
    cursor: pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.25);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-weight: bold;
  }
  .stage-card:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }
  .stage-card .semoji { font-size: 1.8rem; }
  .stage-card.locked { background: #999; color: #eee; cursor: default; opacity: 0.7; }
</style>
</head>
<body class="game-body">
  <a class="home-link" href="../../index.html">🏠 ホームにもどる</a>
  <button class="mute-btn" id="muteBtn">🔊</button>
  <h1 class="game-title">🚗 そうすけの くるまピカピカ</h1>

  <div class="hud" id="hud">
    <span id="stageLabel">ステージ せんたくちゅう</span>
    <span>なおった 🔧 <span id="doneCount">0</span>/<span id="totalCount">7</span></span>
    <span>じかん ⏱️ <span id="timeNow">0.0</span> びょう</span>
  </div>

  <div class="stage-wrap">
    <canvas id="stage" width="460" height="350"></canvas>

    <div class="overlay" id="stageSelectOverlay">
      <h2>🚗 くるまピカピカ</h2>
      <p>あそびたい ステージを えらんでね！ ステージが すすむほど くるまが おおきく なるよ。</p>
      <div class="stage-grid" id="stageGrid"></div>
    </div>

    <div class="overlay hide" id="startOverlay">
      <h2 id="startTitle">🚗 ステージ1</h2>
      <p id="startText"></p>
      <button class="big-btn" id="startBtn">▶ スタート</button>
    </div>

    <div class="overlay hide" id="winOverlay">
      <h2 id="winTitle">🎉 ピカピカに なった！ 🎉</h2>
      <p id="winText"></p>
      <button class="big-btn" id="nextStageBtn">▶ つぎのステージへ</button>
      <button class="big-btn" id="toSelectBtnWin" style="margin-top:10px;">🗺️ ステージせんたくへ</button>
    </div>
  </div>

  <script src="../../audio.js"></script>
  <script src="../../leaderboard.js"></script>
  <script>
    const muteBtn = document.getElementById('muteBtn');
    muteBtn.addEventListener('click', () => {
      const isMuted = GameAudio.toggleMute();
      muteBtn.textContent = isMuted ? '🔇' : '🔊';
    });

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const hudEl = document.getElementById('hud');
    const stageLabelEl = document.getElementById('stageLabel');
    const doneCountEl = document.getElementById('doneCount');
    const totalCountEl = document.getElementById('totalCount');
    const timeNowEl = document.getElementById('timeNow');
    const stageSelectOverlay = document.getElementById('stageSelectOverlay');
    const stageGridEl = document.getElementById('stageGrid');
    const startOverlay = document.getElementById('startOverlay');
    const startTitleEl = document.getElementById('startTitle');
    const startTextEl = document.getElementById('startText');
    const winOverlay = document.getElementById('winOverlay');
    const winTitleEl = document.getElementById('winTitle');
    const winTextEl = document.getElementById('winText');
    const nextStageBtn = document.getElementById('nextStageBtn');

    const STAGES = [
      { id: 1, vehicle: 'sedan', carScale: 0.75, dirtCount: 2, tapsNeeded: 2 },
      { id: 2, vehicle: 'sedan', carScale: 0.82, dirtCount: 2, tapsNeeded: 3 },
      { id: 3, vehicle: 'sedan', carScale: 0.90, dirtCount: 3, tapsNeeded: 3 },
      { id: 4, vehicle: 'van', carScale: 0.80, dirtCount: 3, tapsNeeded: 3 },
      { id: 5, vehicle: 'van', carScale: 0.87, dirtCount: 4, tapsNeeded: 4 },
      { id: 6, vehicle: 'van', carScale: 0.94, dirtCount: 4, tapsNeeded: 4 },
      { id: 7, vehicle: 'bus', carScale: 0.78, dirtCount: 5, tapsNeeded: 4 },
      { id: 8, vehicle: 'bus', carScale: 0.85, dirtCount: 5, tapsNeeded: 5 },
      { id: 9, vehicle: 'bus', carScale: 0.92, dirtCount: 6, tapsNeeded: 5 },
      { id: 10, vehicle: 'bus', carScale: 1.00, dirtCount: 7, tapsNeeded: 5 },
    ];

    const ORIGIN = { x: 230, y: 258 };
    const BASE_WHEEL_R = 26;

    // local (unscaled, origin-relative) geometry for the car
    // いろんな のりものの かたち（きゅうけい＝しゃたい、まど、ドア、タイヤの ばしょ）
    const VEHICLE_TYPES = {
      sedan: {
        emoji: '🚗', name: 'セダン', color: '#FF6B6B', doorColor: '#FF9494', doorDentColor: '#B36B6B',
        bodyOps: [
          { op: 'move', p: [-145, 0] }, { op: 'line', p: [-145, -45] },
          { op: 'quad', cp: [-145, -70], p: [-120, -75] },
          { op: 'line', p: [-75, -90] }, { op: 'line', p: [-75, -135] },
          { op: 'quad', cp: [-75, -150], p: [-60, -150] },
          { op: 'line', p: [30, -150] },
          { op: 'quad', cp: [45, -150], p: [45, -135] },
          { op: 'line', p: [45, -90] }, { op: 'line', p: [115, -75] },
          { op: 'quad', cp: [140, -70], p: [140, -45] },
          { op: 'line', p: [140, 0] }, { op: 'close' },
        ],
        window2Ops: [[30, -135], [30, -90], [110, -77], [45, -135]],
        windowRect: { x: -70, y: -135, w: 70, h: 45 },
        doorRect: { x: 10, y: -85, w: 90, h: 85 },
        wells: [[-75, 0], [85, 0]],
        dirtPool: [
          [-115, -30, 20], [130, -30, 18], [60, -135, 14], [-40, -20, 16],
          [100, -10, 14], [-100, -100, 14], [0, -30, 16],
        ],
      },
      van: {
        emoji: '🚐', name: 'ワゴン', color: '#4C9AFF', doorColor: '#7FBBFF', doorDentColor: '#3A73BF',
        bodyOps: [
          { op: 'move', p: [-160, 0] }, { op: 'line', p: [-160, -110] },
          { op: 'quad', cp: [-160, -140], p: [-130, -140] },
          { op: 'line', p: [130, -140] },
          { op: 'quad', cp: [160, -140], p: [160, -110] },
          { op: 'line', p: [160, 0] }, { op: 'close' },
        ],
        window2Ops: null,
        windowRect: { x: -110, y: -125, w: 150, h: 55 },
        doorRect: { x: -20, y: -70, w: 90, h: 70 },
        wells: [[-90, 0], [90, 0]],
        dirtPool: [
          [-140, -20, 18], [140, -20, 16], [-50, -30, 14], [60, -20, 14],
          [-120, -90, 12], [100, -90, 12], [0, -95, 14],
        ],
      },
      bus: {
        emoji: '🚌', name: 'バス', color: '#FFC048', doorColor: '#FFD879', doorDentColor: '#C99A3E',
        bodyOps: [
          { op: 'move', p: [-190, 0] }, { op: 'line', p: [-190, -130] },
          { op: 'quad', cp: [-190, -155], p: [-165, -155] },
          { op: 'line', p: [165, -155] },
          { op: 'quad', cp: [190, -155], p: [190, -130] },
          { op: 'line', p: [190, 0] }, { op: 'close' },
        ],
        window2Ops: null,
        windowRect: { x: -150, y: -135, w: 260, h: 50 },
        doorRect: { x: 40, y: -75, w: 90, h: 75 },
        wells: [[-130, 0], [130, 0]],
        dirtPool: [
          [-170, -20, 18], [170, -20, 16], [-80, -30, 14], [90, -30, 14],
          [-150, -100, 12], [130, -100, 12], [0, -20, 16],
        ],
      },
    };

    let layoutScale = 1;
    function P(lx, ly) { return { x: ORIGIN.x + lx * layoutScale, y: ORIGIN.y + ly * layoutScale }; }
    function S(v) { return v * layoutScale; }

    let currentStage = 1;
    let currentStageConf = STAGES[0];
    let currentVehicle = VEHICLE_TYPES.sedan;
    let WHEEL_R, WELLS, WINDOW_RECT, DOOR_RECT, DIRT_SPOTS, TIRE_HOMES;

    function buildLayout(stage) {
      layoutScale = stage.carScale;
      currentVehicle = VEHICLE_TYPES[stage.vehicle];
      WHEEL_R = S(BASE_WHEEL_R);
      WELLS = currentVehicle.wells.map(([lx, ly]) => P(lx, ly));
      TIRE_HOMES = [
        { x: WHEEL_R + 12, y: H - 32 },
        { x: W - WHEEL_R - 12, y: H - 32 },
      ];
      const wr = P(currentVehicle.windowRect.x, currentVehicle.windowRect.y);
      WINDOW_RECT = { x: wr.x, y: wr.y, w: S(currentVehicle.windowRect.w), h: S(currentVehicle.windowRect.h) };
      const dr = P(currentVehicle.doorRect.x, currentVehicle.doorRect.y);
      DOOR_RECT = { x: dr.x, y: dr.y, w: S(currentVehicle.doorRect.w), h: S(currentVehicle.doorRect.h) };
      DIRT_SPOTS = currentVehicle.dirtPool.slice(0, stage.dirtCount).map(([lx, ly, r]) => {
        const p = P(lx, ly);
        return { x: p.x, y: p.y, r: S(r) };
      });
    }

    function drawShapeOps(ops) {
      ops.forEach(o => {
        if (o.op === 'move') { const p = P(o.p[0], o.p[1]); ctx.moveTo(p.x, p.y); }
        else if (o.op === 'line') { const p = P(o.p[0], o.p[1]); ctx.lineTo(p.x, p.y); }
        else if (o.op === 'quad') { const cp = P(o.cp[0], o.cp[1]); const p = P(o.p[0], o.p[1]); ctx.quadraticCurveTo(cp.x, cp.y, p.x, p.y); }
        else if (o.op === 'close') { ctx.closePath(); }
      });
    }

    let tires, windowState, doorState, dirtState, playing, elapsed, lastFrame, dragTire;

    const CLEARED_KEY = 'soutaCarFixCleared';
    const BEST_STAGE_KEY = 'soutaCarFixBestStage';
    function getCleared() {
      try { return JSON.parse(localStorage.getItem(CLEARED_KEY) || '[]'); }
      catch (e) { return []; }
    }
    function markCleared(id) {
      const cleared = getCleared();
      if (!cleared.includes(id)) {
        cleared.push(id);
        localStorage.setItem(CLEARED_KEY, JSON.stringify(cleared));
      }
    }
    function isUnlocked(id) {
      if (id <= 1) return true;
      return getCleared().includes(id - 1);
    }
    function getBestStage() { return parseInt(localStorage.getItem(BEST_STAGE_KEY) || '0', 10); }
    function setBestStage(v) { localStorage.setItem(BEST_STAGE_KEY, String(v)); }

    function renderStageSelect() {
      stageGridEl.innerHTML = '';
      STAGES.forEach(stage => {
        const btn = document.createElement('button');
        if (isUnlocked(stage.id)) {
          btn.className = 'stage-card';
          btn.innerHTML = `<span class="semoji">${VEHICLE_TYPES[stage.vehicle].emoji}</span><span>${stage.id}</span>`;
          btn.addEventListener('click', () => openStage(stage.id));
        } else {
          btn.className = 'stage-card locked';
          btn.innerHTML = `<span class="semoji">🔒</span><span>${stage.id}</span>`;
        }
        stageGridEl.appendChild(btn);
      });
    }

    function openStage(n) {
      const stage = STAGES[n - 1];
      if (!stage) return;
      currentStage = n;
      currentStageConf = stage;
      buildLayout(stage);
      const vehicle = VEHICLE_TYPES[stage.vehicle];
      stageLabelEl.textContent = `ステージ${stage.id}（${vehicle.name}）`;
      stageSelectOverlay.classList.add('hide');
      startTitleEl.textContent = `${vehicle.emoji} ステージ${stage.id}：${vehicle.name}`;
      startTextEl.innerHTML = `
        こんかいは ${vehicle.name}だよ！ タイヤが はずれてるよ！<br>
        ながおし して あいてる ところまで はこぼう。<br>
        よごれた ところは タッチして 🧽きれいに（${stage.tapsNeeded}かい タッチ）。<br>
        こわれた まどと ドアも タッチして なおそう！<br>
        ぜんぶ なおしたら クリア！
      `;
      startOverlay.classList.remove('hide');
      winOverlay.classList.add('hide');
      resetGame();
    }

    function backToStageSelect() {
      GameAudio.stopBGM();
      startOverlay.classList.add('hide');
      winOverlay.classList.add('hide');
      renderStageSelect();
      stageSelectOverlay.classList.remove('hide');
      stageLabelEl.textContent = 'ステージ せんたくちゅう';
    }

    function totalTasks() {
      return 2 + currentStageConf.dirtCount + 2; // 2 wheels + dirt + window + door
    }

    function resetGame() {
      tires = [
        { home: TIRE_HOMES[0], x: TIRE_HOMES[0].x, y: TIRE_HOMES[0].y, fixed: false, wellIndex: -1 },
        { home: TIRE_HOMES[1], x: TIRE_HOMES[1].x, y: TIRE_HOMES[1].y, fixed: false, wellIndex: -1 },
      ];
      windowState = { taps: 0, fixed: false };
      doorState = { taps: 0, fixed: false };
      dirtState = DIRT_SPOTS.map(() => ({ taps: 0, clean: false }));
      playing = false;
      elapsed = 0;
      dragTire = null;
      totalCountEl.textContent = totalTasks();
      updateHud();
    }

    function updateHud() {
      const fixedWheels = tires.filter(t => t.fixed).length;
      const cleanDirt = dirtState.filter(d => d.clean).length;
      const done = fixedWheels + cleanDirt + (windowState.fixed ? 1 : 0) + (doorState.fixed ? 1 : 0);
      doneCountEl.textContent = done;
      timeNowEl.textContent = elapsed.toFixed(1);
      return done;
    }

    function checkWin() {
      const done = updateHud();
      if (done >= totalTasks() && playing) {
        triggerWin();
      }
    }

    function triggerWin() {
      playing = false;
      GameAudio.stopBGM();
      GameAudio.playClearFanfare();
      const finalTime = Math.round(elapsed * 10) / 10;
      const priorBest = getBestStage();
      markCleared(currentStage);
      if (currentStage > priorBest) {
        setBestStage(currentStage);
        Leaderboard.showRankFlow({ gameId: 'car-fix', score: currentStage, higherIsBetter: true, unit: 'ステージ', title: '🚗 すすんだ ステージ ランキング' });
      }
      const next = STAGES[currentStage];
      if (next) {
        winTitleEl.textContent = '🎉 ピカピカに なった！ 🎉';
        winTextEl.textContent = `${finalTime}びょうで なおせたね！ つぎの もっと おおきい くるまへ！`;
        nextStageBtn.classList.remove('hide');
        nextStageBtn.onclick = () => openStage(next.id);
      } else {
        winTitleEl.textContent = '🏆 ぜんぶ ピカピカ！ 🏆';
        winTextEl.textContent = `${finalTime}びょうで なおせたね！ 10だいめの おおきな くるまも かんぺき！`;
        nextStageBtn.classList.add('hide');
      }
      winOverlay.classList.remove('hide');
    }

    function startGame() {
      resetGame();
      startOverlay.classList.add('hide');
      playing = true;
      lastFrame = performance.now();
      GameAudio.playBGM();
    }

    function retrySameStage() {
      openStage(currentStage);
    }

    function getCanvasPos(evt) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width, scaleY = H / rect.height;
      return { x: (evt.clientX - rect.left) * scaleX, y: (evt.clientY - rect.top) * scaleY };
    }

    function tapAt(x, y) {
      if (!playing) return;
      const tapsNeeded = currentStageConf.tapsNeeded;

      if (!windowState.fixed && x >= WINDOW_RECT.x && x <= WINDOW_RECT.x + WINDOW_RECT.w &&
          y >= WINDOW_RECT.y && y <= WINDOW_RECT.y + WINDOW_RECT.h) {
        windowState.taps++;
        GameAudio.playClickTick();
        if (windowState.taps >= tapsNeeded) windowState.fixed = true;
        checkWin();
        return;
      }

      if (!doorState.fixed && x >= DOOR_RECT.x && x <= DOOR_RECT.x + DOOR_RECT.w &&
          y >= DOOR_RECT.y && y <= DOOR_RECT.y + DOOR_RECT.h) {
        doorState.taps++;
        GameAudio.playClickTick();
        if (doorState.taps >= tapsNeeded) doorState.fixed = true;
        checkWin();
        return;
      }

      for (let i = 0; i < DIRT_SPOTS.length; i++) {
        const spot = DIRT_SPOTS[i];
        const st = dirtState[i];
        if (st.clean) continue;
        if (Math.hypot(x - spot.x, y - spot.y) <= spot.r) {
          st.taps++;
          GameAudio.playClickTick();
          if (st.taps >= tapsNeeded) st.clean = true;
          checkWin();
          return;
        }
      }
    }

    canvas.addEventListener('pointerdown', (e) => {
      if (!playing) return;
      const pos = getCanvasPos(e);
      const hitTire = tires.find(t => !t.fixed && Math.hypot(pos.x - t.x, pos.y - t.y) <= WHEEL_R);
      if (hitTire) {
        dragTire = hitTire;
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      tapAt(pos.x, pos.y);
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!dragTire) return;
      const pos = getCanvasPos(e);
      dragTire.x = pos.x;
      dragTire.y = pos.y;
    });

    canvas.addEventListener('pointerup', () => {
      if (!dragTire) return;
      const snapRange = Math.max(30, WHEEL_R * 1.7);
      const emptyWell = WELLS.find((w, i) => !tires.some(t => t.fixed && t.wellIndex === i) &&
        Math.hypot(dragTire.x - w.x, dragTire.y - w.y) < snapRange);
      if (emptyWell) {
        dragTire.x = emptyWell.x;
        dragTire.y = emptyWell.y;
        dragTire.fixed = true;
        dragTire.wellIndex = WELLS.indexOf(emptyWell);
        GameAudio.playClickTick();
        checkWin();
      } else {
        dragTire.x = dragTire.home.x;
        dragTire.y = dragTire.home.y;
      }
      dragTire = null;
    });

    function drawWheelWell(x, y) {
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(x, y, WHEEL_R + S(4), Math.PI, Math.PI * 2);
      ctx.fill();
    }

    function drawWheel(x, y) {
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(x, y, WHEEL_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#CCCCCC';
      ctx.beginPath();
      ctx.arc(x, y, WHEEL_R * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#EAF6FF';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#CFE8CF';
      ctx.fillRect(0, H - 30, W, 30);

      if (!WELLS) return;

      WELLS.forEach(w => drawWheelWell(w.x, w.y));

      // body
      ctx.fillStyle = currentVehicle.color;
      ctx.beginPath();
      drawShapeOps(currentVehicle.bodyOps);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = Math.max(2, S(3));
      ctx.stroke();

      // second window (always clean, decorative — sedan only)
      if (currentVehicle.window2Ops) {
        ctx.fillStyle = '#BEE3F8';
        ctx.beginPath();
        const w2 = currentVehicle.window2Ops.map(([lx, ly]) => P(lx, ly));
        ctx.moveTo(w2[0].x, w2[0].y);
        w2.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.stroke();
      }

      const tapsNeeded = currentStageConf.tapsNeeded;

      // window (repairable)
      if (windowState.fixed) {
        ctx.fillStyle = '#BEE3F8';
        ctx.fillRect(WINDOW_RECT.x, WINDOW_RECT.y, WINDOW_RECT.w, WINDOW_RECT.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.strokeRect(WINDOW_RECT.x, WINDOW_RECT.y, WINDOW_RECT.w, WINDOW_RECT.h);
      } else {
        ctx.fillStyle = '#8892A0';
        ctx.fillRect(WINDOW_RECT.x, WINDOW_RECT.y, WINDOW_RECT.w, WINDOW_RECT.h);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(WINDOW_RECT.x + S(5), WINDOW_RECT.y + S(5));
        ctx.lineTo(WINDOW_RECT.x + S(35), WINDOW_RECT.y + S(25));
        ctx.lineTo(WINDOW_RECT.x + S(20), WINDOW_RECT.y + S(40));
        ctx.lineTo(WINDOW_RECT.x + S(60), WINDOW_RECT.y + S(10));
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.max(11, Math.round(S(14)))}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(`👆${tapsNeeded - windowState.taps}`, WINDOW_RECT.x + WINDOW_RECT.w / 2, WINDOW_RECT.y + WINDOW_RECT.h / 2 + 5);
      }

      // door (repairable)
      if (doorState.fixed) {
        ctx.fillStyle = currentVehicle.doorColor;
        ctx.fillRect(DOOR_RECT.x, DOOR_RECT.y, DOOR_RECT.w, DOOR_RECT.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.strokeRect(DOOR_RECT.x, DOOR_RECT.y, DOOR_RECT.w, DOOR_RECT.h);
        ctx.fillStyle = '#333';
        ctx.fillRect(DOOR_RECT.x + DOOR_RECT.w - S(16), DOOR_RECT.y + DOOR_RECT.h / 2 - S(4), S(10), S(8));
      } else {
        ctx.save();
        ctx.translate(DOOR_RECT.x + DOOR_RECT.w / 2, DOOR_RECT.y + DOOR_RECT.h / 2);
        ctx.rotate(-0.08);
        ctx.fillStyle = currentVehicle.doorDentColor;
        ctx.fillRect(-DOOR_RECT.w / 2, -DOOR_RECT.h / 2, DOOR_RECT.w, DOOR_RECT.h);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(-DOOR_RECT.w / 2, -DOOR_RECT.h / 2, DOOR_RECT.w, DOOR_RECT.h);
        ctx.restore();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.max(11, Math.round(S(14)))}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(`🔧${tapsNeeded - doorState.taps}`, DOOR_RECT.x + DOOR_RECT.w / 2, DOOR_RECT.y + DOOR_RECT.h / 2 + 5);
      }

      // dirt spots
      DIRT_SPOTS.forEach((spot, i) => {
        const st = dirtState[i];
        if (st.clean) return;
        ctx.fillStyle = `rgba(120,80,40,${Math.max(0.15, 0.85 - st.taps * (0.7 / tapsNeeded))})`;
        ctx.beginPath();
        ctx.arc(spot.x, spot.y, spot.r, 0, Math.PI * 2);
        ctx.fill();
      });

      tires.forEach(t => { if (t.fixed) drawWheel(t.x, t.y); });
      tires.forEach(t => { if (!t.fixed) drawWheel(t.x, t.y); });
    }

    function loop(now) {
      if (playing) {
        elapsed += Math.min(0.05, (now - lastFrame) / 1000);
        timeNowEl.textContent = elapsed.toFixed(1);
      }
      lastFrame = now;
      draw();
      requestAnimationFrame(loop);
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('toSelectBtnWin').addEventListener('click', backToStageSelect);

    renderStageSelect();
    lastFrame = performance.now();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
